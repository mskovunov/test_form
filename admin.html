<!DOCTYPE html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <title>Адмін-панель</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />

    <script
      async
      src="https://www.googletagmanager.com/gtag/js?id=G-N0T0138X0Q"
    ></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag() {
        dataLayer.push(arguments);
      }
      gtag("js", new Date());

      gtag("config", "G-N0T0138X0Q");
    </script>
  </head>
  <body>
    <div class="container">
      <button class="menu-button" onclick="toggleMenu()">
        <svg
          width="24"
          height="24"
          viewBox="0 0 24 24"
          fill="none"
          xmlns="http://www.w3.org/2000/svg"
        >
          <path
            d="M4 6H20"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          />
          <path
            d="M4 12H20"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          />
          <path
            d="M4 18H20"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          />
        </svg>
      </button>

      <div class="form-wrapper">
        <!-- Боковое меню зачитываем из utils.js-->
        <div id="sidebar-placeholder"></div>

        <h2>Панель адміністратора</h2>

        <p
          id="admin-status"
          style="text-align: center; margin-bottom: 20px"
        ></p>

        <h3 style="text-align: center; margin-bottom: 15px;">Лог статусу порту зарядки</h3>
        <div id="log-table-container"></div>

        <div style="margin-top: 30px; padding-top: 20px; border-top: 1px solid var(--border-color); text-align: center;">
            <h3 style="margin-bottom: 15px;">Керування даними</h3>
            <button style="width: 100%; max-width: 300px; padding: 12px; font-size: 14px; background-color: var(--secondary-button-bg, #6c757d); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: background-color 0.3s;" 
                    onclick="if(confirm('УВАГА: Ви впевнені, що хочете видалити всі існуючі записи показників у Firestore і завантажити їх знову з Google Sheets? Це може зайняти певний час.')) { this.innerHTML = '⏳ Виконується...'; this.disabled = true; migrateAllHistoryToFirestore().then(() => { this.innerHTML = '🔄 Синхронізувати всю історію'; this.disabled = false; }); }">
                🔄 Синхронізувати всю історію
            </button>
            <p style="font-size: 0.75rem; color: #999; margin-top: 8px;">Завантажити попередні показники з GAS у Firestore</p>
        </div>

        <p
          id="buildVersion"
          style="
            margin-top: 20px;
            font-size: 0.75rem;
            color: #999;
            text-align: center;
          "
        ></p>
      </div>
    </div>

    <script src="config.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script src="./firebase-init.js"></script>
    <script src="api/gas-service.js"></script>
    <script src="api/firebase-service.js"></script>
    <script src="utils.js"></script>
    <script src="api/migrate-history.js"></script>

    <script>
      // Глобальная переменная для отслеживания статуса
      let isAdmin = false;

      // --- ФУНКЦИИ АДМИНИСТРАТОРА ---

      async function checkAdminStatus(user) {
        if (!user || typeof db === "undefined") {
          window.location.replace("auth.html"); // Не авторизован
          return;
        }

        try {
          const data = await loadUserUI(user);

          if (data && data.role === "admin") {
            isAdmin = true;
            // Администратор, загружаем логи
            loadPortLogs();
          } else {
            alert(
              "Доступ заборонено. Тільки адміністратори можуть переглядати цю сторінку."
            );
            window.location.replace("index.html"); // Перенаправляем обратно
          }
        } catch (error) {
          console.error("Ошибка проверки роли администратора:", error);
          alert("Ошибка доступа.");
          window.location.replace("index.html");
        }
      }

      // --- ЗАГРУЗКА И РЕНДЕРИНГ ЛОГОВ ---

      async function loadPortLogs() {
        const logDiv = document.getElementById("log-table-container");
        const statusDiv = document.getElementById("admin-status");

        // Показываем спиннер
        statusDiv.innerHTML = `<span class="inline-spinner-wrapper"><span class="inline-spinner"></span> Завантаження логів порту...</span>`;
        statusDiv.style.display = "block";

        try {
          // Получаем логи, сортируем по времени (новые сверху) - лимит 15
          const logData = await FirebaseService.getPortLogs(15);

          statusDiv.style.display = "none";

          if (!logData || logData.length === 0) {
            logDiv.innerHTML =
              '<p style="text-align: center;">Логи перемикання порту не знайдено.</p>';
          } else {
            renderLogTable(logData, logDiv);
          }
        } catch (error) {
          console.error("Ошибка загрузки логов:", error);
          statusDiv.innerHTML = `<p style="color: var(--status-error);">⚠️ Помилка завантаження логів. Перевірте Правила Firestore.</p>`;
        }
      }

      function renderLogTable(data, container) {
        let html = `
            <div class="table-scroll">
                <table class="config-table">
                    <thead>
                        <tr>
                            <th>Час (місцевий)</th>
                            <th>Користувач (логін)</th>
                            <th class="status-col">Статус</th>
                        </tr>
                    </thead>
                    <tbody>
        `;

        data.forEach((row) => {
          // Используем сохраненное локальное время или конвертируем серверный timestamp
          const timeValue = row.timestamp ? row.timestamp.toDate() : new Date();
          const localTimeString =
            row.localTime ||
            timeValue
              .toLocaleDateString("uk-UA", {
                day: "2-digit",
                month: "2-digit",
                year: "numeric",
                hour: "2-digit",
                minute: "2-digit",
                second: "2-digit",
                hour12: false,
              })
              .replace(",", "");

          const statusUA =
            row.statusUA || (row.status === "busy" ? "Зайнятий" : "Доступний");
          // Используем классы из style.css
          const statusClass = row.status === "busy" ? "inactive" : "active";
          const statusIcon = row.status === "busy" ? "🔴" : "🟢";

          html += `
                <tr class="row-${statusClass}">
                    <td>${localTimeString}</td>
                    <td>${
                      row.username || row.email || row.userId || "Невідомий"
                    }</td>
                    <td class="status-col">
                        <span class="status-indicator status-${statusClass}">
                            ${statusIcon} ${statusUA}
                        </span>
                    </td>
                </tr>
            `;
        });

        html += `</tbody></table></div>`;
        container.innerHTML = html;
      }

      // --- Инициализация ---
      window.addEventListener("DOMContentLoaded", async () => {
        // Загрузка темы
        if (localStorage.getItem("theme") === "dark") {
          document.body.classList.add("dark");
        }
        await loadComponent("sidebar-placeholder", "sidebar.html");
        document.getElementById("buildVersion").textContent = BUILD_VERSION;

        // Запускаем проверку авторизации и роли
        auth.onAuthStateChanged((user) => {
          if (user) {
            checkAdminStatus(user);
          } else {
            window.location.replace("auth.html"); // Если не вошел, отправляем на логин
          }
        });
      });
    </script>
  </body>
</html>
