     <span id="user-email-display" title="Ваш користувач"></span>

  <div class="form-wrapper">

	<!-- Боковое меню зачитываем из utils.js-->

    <h2>Форма для передачі показників лічильника</h2>

<label>🔌 Статус порта зарядки: </label>
<div class="port-status-block"> 
  
  <!-- ДОБАВЛЕНИЕ 1: Элемент загрузки (отображается по умолчанию) -->
  <div class="status-loader-wrapper" id="portLoader">
      <div class="status-loader"></div>
  </div>
  
  <div class="port-status-content">
    <div class="port-indicator" id="portIndicator">
      <img src="img/Type_2_transp.png" alt="Type-2 порт" class="port-icon">
    </div>
    
  <div class="port-toggle-wrapper">
    <label class="switch">
      <input type="checkbox" id="portToggle" onchange="togglePortStatus()">
      <span class="slider"></span>
    </label>
    <div id="portStatusText" class="port-status-label">Доступний</div>
  </div>
  </div>
</div>
	
    <form id="meterForm">
	
      <label>Попередній показник:
        <input type="number" id="prevReading" readonly placeholder="Завантаження...">
      </label>

      <label>Новий показник:
        <input type="number" name="reading" required step="0.1" min="0" placeholder="Наприклад: 405.5">
      </label>

      <label>Користувач:
        <select name="name" required>
          <option value="" disabled selected>Оберіть користувача</option>
          <option value="eGolf">eGolf</option>
          <option value="iONIQ">iONIQ</option>
          <option value="інше">інше</option>
        </select>
      </label>

      <button type="submit">Відправити</button>
    </form>
    
    <!-- ИЗМЕНЕНИЕ 2: СТРУКТУРА АККОРДЕОНА ДЛЯ ИСТОРИИ -->
    <div class="accordion-item button-like">
        <div class="accordion-header" id="historyHeader" onclick="toggleHistoryAccordion()">
            <span class="accordion-title">📊 Поточний місяць</span>
            <span class="accordion-icon" style="display: none;">▼</span>
        </div>
        <div class="accordion-content" id="historyContent">
            <!-- Здесь будет лоадер при первом открытии -->
            <div id="history"></div>
        </div>
    </div>
    <!-- КОНЕЦ АККОРДЕОНА -->

 <p id="status"></p>
    
    <p id="buildVersion" style="margin-top: 20px; font-size: 0.75rem; color: #999; text-align: center;"></p>
</div>
  </div>
  </div>

  <!-- Подключаем файл конфигурации ПЕРЕД основным скриптом -->
  <script src="config.js"></script>
  <script src="utils.js"></script>
	
  <script>
	let currentUsername = null;

    function toggleAccordion(contentId, buffer = 50) {
        const content = document.getElementById(contentId);
        const header = content.previousElementSibling; 
        const icon = header.querySelector('.accordion-icon');
        
        content.classList.toggle('open');
        header.classList.toggle('active');

        if (content.classList.contains('open')) {
            // Развернуть: устанавливаем max-height на фактическую высоту контента + БУФЕР
            content.style.maxHeight = (content.scrollHeight + buffer) + "px"; 
            icon.innerHTML = '▲';
        } else {
            // Свернуть
            content.style.maxHeight = '0';
            icon.innerHTML = '▼';
        }
    }

    // --- НОВАЯ ФУНКЦИЯ ДЛЯ ОБРАБОТКИ АККОРДЕОНА ИСТОРИИ ---
    async function toggleHistoryAccordion() {
        const contentId = 'historyContent';
        const content = document.getElementById(contentId);
        const historyDiv = document.getElementById('history');
        const isOpening = !content.classList.contains('open');

        // Сворачиваем/разворачиваем
        toggleAccordion(contentId);
        
        // Если блок открывается, и данные еще не загружены
        if (isOpening && historyDiv.innerHTML.trim() === '') {
             
            historyDiv.innerHTML = `<p style="text-align: center;">
                <span class="inline-spinner-wrapper"><span class="inline-spinner"></span> Завантаження історії...</span>
            </p>`;
            
            // Принудительный перерасчет высоты, чтобы показать лоадер
            content.style.maxHeight = (content.scrollHeight + 50) + "px";

            try {
                const jsonStr = await FirebaseService.getManualReadingsHistory();
                const data = JSON.parse(jsonStr);
                
                let html = '<div id="history"><h3>Останні показники</h3><table><thead><tr><th>Дата</th><th>Корист.</th><th>Було</th><th>Стало</th><th>Різниця</th></tr></thead><tbody>';
                data.forEach(row => {
                    html += `<tr>
                        <td>${row.date}</td>
                        <td>${row.user}</td>
                        <td>${row.from}</td>
                        <td>${row.to}</td>
                        <td>${row.diff}</td>
                    </tr>`;
                });
                html += '</tbody></table></div>';
                
                historyDiv.innerHTML = html;
            } catch (err) {
                historyDiv.innerHTML = '<p style="color: var(--status-error); text-align: center;">⚠️ Помилка при завантаженні історії.</p>';
                console.error('Помилка історії:', err);
            }
            
            // Финальный перерасчет высоты, чтобы вместить загруженный контент (таблицу или ошибку)
            // Используем таймаут, чтобы дать браузеру время на рендеринг таблицы
            setTimeout(() => {
                 content.style.maxHeight = (content.scrollHeight + 50) + "px";
            }, 50);
        }
    }
    // --- КОНЕЦ НОВОЙ ФУНКЦИИ ---


    async function loadPreviousReading() {
      try {
        const val = await FirebaseService.getLastManualReading();
        document.getElementById('prevReading').value = val || '';
      } catch (err) {
        console.error('Помилка при отриманні попереднього показника:', err);
      }
    }
	
/* --- ДОБАВЛЕНО: loadPortStatusFromSheet (с управлением загрузчиком) --- */
    async function loadPortStatusFromSheet() {
        const loader = document.getElementById('portLoader');
        
        try {
            const status = (await FirebaseService.getPortStatus()).trim(); 
            localStorage.setItem("portStatus", status); 
            updatePortToggleUI(status);
        } catch (err) {
            console.error('Помилка при отриманні статусу порта:', err);
            // Если GAS недоступен, используем значение из localStorage (по умолчанию 'available')
            const saved = localStorage.getItem("portStatus") || "available";
            updatePortToggleUI(saved);
        } finally {
            // ИЗМЕНЕНИЕ 2: Скрываем загрузчик после завершения операции
            loader.classList.add('hidden');
        }
    }
    /* --- КОНЕЦ ДОБАВЛЕНИЯ --- */


	
function updatePortToggleUI(status) {
  const toggle = document.getElementById("portToggle");
  const text = document.getElementById("portStatusText");
  const indicator = document.getElementById("portIndicator");

  toggle.checked = status === "busy"; // ВКЛ означает busy
  text.textContent = status === "busy" ? "Зайнятий" : "Доступний";
  indicator.style.backgroundColor = status === "busy" ? "#c62828" : "#2e7d32";
}

    function togglePortStatus() {
      const isBusy = document.getElementById("portToggle").checked;
      const status = isBusy ? "busy" : "available";
      const statusValue = isBusy ? "1" : "0";
	  // ИСПРАВЛЕНО: Получаем текущего пользователя здесь, чтобы избежать ошибки ReferenceError
      const user = firebase.auth().currentUser; // Получаем текущего пользователя Firebase
    
      // Используем username, если он отображается в заголовке, или пусто
      const username = document.getElementById('user-email-display').textContent || '';	  
	  
	  if (typeof GoogleAnalytics !== 'undefined') {
        const eventName = isBusy ? 'port_set_busy' : 'port_set_available';
        GoogleAnalytics.logEvent(eventName);
	  }
	
      localStorage.setItem("portStatus", status);
      updatePortToggleUI(status);
	  // 1. ДОБАВЛЕНО: Логирование в Firestore
		if (user) {
			FirebaseService.logPortStatusChange(user, status, username);
		}

	  // 2. ДОБАВЛЕН ВЫЗОВ УВЕДОМЛЕНИЯ ANDROID
      let notificationTitle;
      let notificationMessage;
      
      if (status === "busy") {
          notificationTitle = "Статус: ЗАЙНЯТИЙ";
          notificationMessage = "Порт зарядки позначено як зайнятий.";
      } else {
          notificationTitle = "Статус: ДОСТУПНИЙ";
          notificationMessage = "Порт зарядки знову доступний для використання!";
      }

      if (typeof AndroidNotifier !== 'undefined') {
          // Вызываем нативный метод, который покажет системное уведомление
          AndroidNotifier.showNotification(notificationTitle, notificationMessage);
      }
	  // 3. Отправка данных в Google Apps Script (GAS)
      GasService.setPortStatus(statusValue)
      .then(console.log)
      .catch(console.error);
    }

	
/* --- ИСПРАВЛЕННЫЙ И ОБЪЕДИНЕННЫЙ DOMContentLoaded --- */
window.addEventListener('DOMContentLoaded', async () => {

	  // АСИНХРОННО: Запрашиваем актуальный статус из GAS 
	  loadPortStatusFromSheet();  
loadPreviousReading();
if (localStorage.getItem('theme') === 'dark') {
document.body.classList.add('dark');
}
	    await loadComponent('sidebar-placeholder', 'sidebar.html');
document.getElementById('buildVersion').textContent = BUILD_VERSION; 
});



	
	// НОВАЯ ФУНКЦИЯ: Заглушка для клика по имени пользователя
	function showUserProfile() {
		//alert("Переход в профиль пользователя (заглушка)");
		console.log("Clicked on user profile link.");
	}

	
    const form = document.getElementById("meterForm");
    const status = document.getElementById("status");

form.addEventListener("submit", async function (e) {
e.preventDefault();

      // 1. Показываем статус "Отправка..."
	  status.innerHTML = `<span class="inline-spinner-wrapper">
                            <span class="inline-spinner"></span> 
                            Відправка даних...
                          </span>`;
      status.classList.remove('success', 'error', 'show');
      status.classList.add('show'); // Класс 'show' делает его видимым

let success = false;
	  const currentSelectedUser = form.name.value;
      const newReading = form.reading.value;
      const prevReading = document.getElementById('prevReading').value;
      const currentUser = firebase.auth().currentUser;
	  
      let gasSuccess = false;
      let fbSuccess = false;

try {
          // Запускаємо відправку паралельно
          const [gasRes, fbRes] = await Promise.allSettled([
              GasService.submitReading(currentSelectedUser, newReading),
              FirebaseService.saveManualReading(currentUser, currentSelectedUser, prevReading, newReading)
          ]);
          
          if (gasRes.status === 'fulfilled' && gasRes.value === "Success") {
              gasSuccess = true;
          } else {
              console.error("GAS повернув помилку або відмовив:", gasRes.reason || gasRes.value);
          }

          if (fbRes.status === 'fulfilled' && fbRes.value === true) {
              fbSuccess = true;
          } else {
              console.error("Firestore повернув помилку або відмовив:", fbRes.reason);
          }
} catch (err) {
    console.error("Критична помилка під час відправки:", err);
} finally {
        success = gasSuccess || fbSuccess;
        
        // 2. Обновляем статус
        if (success) {
            status.innerText = "✅ Дані успішно відправлені!";
            status.classList.add("success");
            
            if (!gasSuccess) {
                console.warn("Дані збережені лише у Firebase (помилка GAS).");
            }
            if (!fbSuccess) {
                console.warn("Дані збережені лише у GAS (помилка Firebase).");
            }

			// Отправка аналитики в Гугл
			if (typeof GoogleAnalytics !== 'undefined') {
            const user = form.name.value;
            const reading = form.reading.value;
            GoogleAnalytics.logSubmitEvent(user, reading);
			}
            // Сброс формы и обновление предыдущего показателя только при успехе
            form.reset();
            loadPreviousReading(); 
			setFormUser(currentSelectedUser);
			
        } else {
            status.innerText = "⚠️ Помилка при відправці даних!";
            status.classList.add("error");
        }
        
        // 3. Скрываем статус через 3 секунды
        setTimeout(() => {
            status.classList.remove("show", "success", "error");
        }, 3000);

}
 });

		
	function setFormUser(username) {
    const select = document.querySelector('select[name="name"]');
    if (!select || !username) return;

    // Ищем опцию, текст которой совпадает с username (например, 'eGolf')
    let foundOption = false;
    for (let i = 0; i < select.options.length; i++) {
        const option = select.options[i];
        
        // Сравнение без учета регистра для надежности
        if (option.value.toLowerCase() === username.toLowerCase()) {
            option.selected = true;
            foundOption = true;
            break;
        }
    }
    
    if (foundOption) {
        console.log(`Поле 'Користувач' установлено на: ${username}`);
    } else {
        console.warn(`Пользователь '${username}' не найден в списке опций формы.`);
    }
	}
		

		
  </script>

	<script>
	// Проверка статуса авторизации при загрузке страницы
    auth.onAuthStateChanged(async (user) => {
        if (!user) {
            // Если пользователь НЕ авторизован
            console.log("Пользователь не авторизован. Перенаправление на страницу входа.");
            // Перенаправить на страницу входа
            window.location.replace('auth.html'); 
        } else {
            // Пользователь авторизован
            console.log("Пользователь авторизован як:", user.email);
            
            // НОВОЕ: Загрузка и отображение username через спільно використовувану функцію
            const data = await loadUserUI(user);
            if (data && data.username) {
                currentUsername = data.username;
                setFormUser(currentUsername);
            }
        }
    });

    // // (Ваш существующий код для загрузки данных из GAS должен быть ниже этого блока)
</script>
